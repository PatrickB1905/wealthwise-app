name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs for the same PR/branch (saves CI time and gives faster feedback).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile --non-interactive

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests
        run: yarn test

      - name: Build
        run: yarn build

  services:
    name: "Service: ${{ matrix.service }} (ruff, mypy, pytest)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        service:
          - positions
          - market-data
          - analytics
          - news

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            services/${{ matrix.service }}/requirements.txt
            services/${{ matrix.service }}/requirements-dev.txt
            services/${{ matrix.service }}/pyproject.toml

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
          PIP_NO_PYTHON_VERSION_WARNING: "1"
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Ruff
        working-directory: services/${{ matrix.service }}
        run: python -m ruff check .

      # Run mypy when it exists & is installed, otherwise skip cleanly.
      - name: Mypy (if available)
        working-directory: services/${{ matrix.service }}
        run: |
          if python -c "import mypy" >/dev/null 2>&1; then
            if [ -d app ]; then
              python -m mypy app
            else
              echo "Skipping mypy: no ./app directory"
            fi
          else
            echo "Skipping mypy: not installed in this service"
          fi

      - name: Pytest
        working-directory: services/${{ matrix.service }}
        env:
          # Prevent tests from accidentally attempting to load local dotenv files in CI
          LOAD_DOTENV: "0"
        run: python -m pytest