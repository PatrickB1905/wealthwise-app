services:
  db:
    image: postgres:15
    container_name: wealthwise-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wealthwise}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - wealthwise_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  positions:
    build:
      context: .
      dockerfile: services/positions/Dockerfile
    container_name: wealthwise-positions
    env_file:
      - ./.env
    environment:
      PORT: "4000"
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 15

  market-data:
    build:
      context: ./services/market-data
      dockerfile: Dockerfile
    container_name: wealthwise-market-data
    env_file:
      - ./.env
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 15

  analytics:
    build:
      context: ./services/analytics
      dockerfile: Dockerfile
    container_name: wealthwise-analytics
    env_file:
      - ./.env
    ports:
      - "7000:7000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:7000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 15

  news:
    build:
      context: ./services/news
      dockerfile: Dockerfile
    container_name: wealthwise-news
    env_file:
      - ./.env
    ports:
      - "6500:6500"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:6500/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 15

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_POSITIONS_API_URL: ${VITE_POSITIONS_API_URL}
        VITE_MARKET_DATA_API_URL: ${VITE_MARKET_DATA_API_URL}
        VITE_ANALYTICS_API_URL: ${VITE_ANALYTICS_API_URL}
        VITE_NEWS_API_URL: ${VITE_NEWS_API_URL}
    container_name: wealthwise-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      positions:
        condition: service_healthy
      market-data:
        condition: service_healthy
      analytics:
        condition: service_healthy
      news:
        condition: service_healthy

volumes:
  wealthwise_db:
